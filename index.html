<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <style>

<body>
<div class="app-container">
    <div class="topic-bar">
        <button class="topic-btn" data-section="section1">1. Subsets</button>
        <button class="topic-btn" data-section="section2">2. Subsets (Bitmasking Original)</button>
        <button class="topic-btn" data-section="section3">3. Binary + Subsets (Indices)</button>
        <button class="topic-btn" data-section="section4">4. Rectangular Geometry</button>
        <button class="topic-btn" data-section="section5">5. Backtracking (Password)</button>
    </div>
    <div class="two-col-layout" id="mainLayout">
        <div class="left-panel">
            <div class="panel-header">
                📘 <span id="leftTitle">C++ Program</span>
            </div>
            <div id="leftContent" class="content-scroll"></div>
        </div>
        <div class="right-panel">
            <div class="panel-header">
                📖 <span id="rightTitle">Explanation</span>
            </div>
            <div id="rightContent" class="content-scroll"></div>
        </div>
    </div>
</div>

<script>
    // ======================= SECTION 1,2,3,4 (unchanged, kept minimal for consistency) =======================
    const section2Steps = [
        { stepNumber: 1, program: "#include <iostream>", explanation: "Includes input-output library." },
        { stepNumber: 2, program: "using namespace std;", explanation: "Std namespace." },
        { stepNumber: 3, program: "int main() {", explanation: "Main start." },
        { stepNumber: 4, program: "    int arr[] = {1, 3, 5, 6, 7};", explanation: "Array of 5 elements." },
        { stepNumber: 5, program: "    int n = 5;", explanation: "n = 5." },
        { stepNumber: 6, program: "    for (int mask = 0; mask < (1 << n); mask++) {", explanation: "Mask loop." },
        { stepNumber: 7, program: "        cout << \"{ \";", explanation: "Print open brace." },
        { stepNumber: 8, program: "        for (int i = 0; i < n; i++)", explanation: "Inner loop." },
        { stepNumber: 9, program: "            if (mask & (1 << i))", explanation: "Check bit." },
        { stepNumber: 10, program: "                cout << arr[i] << \" \";", explanation: "Print element." },
        { stepNumber: 11, program: "        cout << \"}\" << endl;", explanation: "Close subset." },
        { stepNumber: 12, program: "    }", explanation: "End mask loop." },
        { stepNumber: 13, program: "    return 0;", explanation: "Exit." },
        { stepNumber: 14, program: "}", explanation: "End main." }
    ];
    const section3Steps = [
        { stepNumber: 1, program: "#include <iostream>", explanation: "I/O." },
        { stepNumber: 2, program: "using namespace std;", explanation: "Std." },
        { stepNumber: 3, program: "void printBinary(int num) {", explanation: "Print binary." },
        { stepNumber: 4, program: "    cout << \"Binary: \";", explanation: "Label." },
        { stepNumber: 5, program: "    if (num == 0) { cout << \"0\"; return; }", explanation: "Zero case." },
        { stepNumber: 6, program: "    int binary[32], i=0;", explanation: "Array." },
        { stepNumber: 7, program: "    while(num>0){ binary[i++]=num%2; num/=2; }", explanation: "Extract bits." },
        { stepNumber: 8, program: "    for(int j=i-1;j>=0;j--) cout<<binary[j];", explanation: "Print reverse." },
        { stepNumber: 9, program: "}", explanation: "End." },
        { stepNumber: 10, program: "void generateSubsets(int n) {", explanation: "Subsets." },
        { stepNumber: 11, program: "    cout << \"\\nSubsets:\\n\";", explanation: "Header." },
        { stepNumber: 12, program: "    for(int mask=0; mask<(1<<n); mask++) {", explanation: "Mask loop." },
        { stepNumber: 13, program: "        cout << \"{ \";", explanation: "Open." },
        { stepNumber: 14, program: "        for(int i=0;i<n;i++) if(mask&(1<<i)) cout<<i<<\" \";", explanation: "Print indices." },
        { stepNumber: 15, program: "        cout << \"}\" << endl;", explanation: "Close." },
        { stepNumber: 16, program: "    }", explanation: "End." },
        { stepNumber: 17, program: "}", explanation: "End." },
        { stepNumber: 18, program: "int main() {", explanation: "Main." },
        { stepNumber: 19, program: "    int num; cin>>num;", explanation: "Input." },
        { stepNumber: 20, program: "    printBinary(num); generateSubsets(num); return 0;", explanation: "Call." },
        { stepNumber: 21, program: "}", explanation: "End." }
    ];
    const rectangleSteps = [
        { stepNumber: 1, program: "#include <iostream>", explanation: "I/O." },
        { stepNumber: 2, program: "using namespace std;", explanation: "Std." },
        { stepNumber: 3, program: "int main() {", explanation: "Main." },
        { stepNumber: 4, program: "    int a_bl_x=0,a_bl_y=0, a_tr_x=4,a_tr_y=4;", explanation: "Rect A." },
        { stepNumber: 5, program: "    int b_bl_x=2,b_bl_y=2, b_tr_x=6,b_tr_y=6;", explanation: "Rect B." },
        { stepNumber: 6, program: "    int a_width=a_tr_x-a_bl_x, a_height=a_tr_y-a_bl_y;", explanation: "Width/height A." },
        { stepNumber: 7, program: "    int a_area=a_width*a_height;", explanation: "Area A." },
        { stepNumber: 8, program: "    cout<<\"Rectangle A Area: \"<<a_area<<endl;", explanation: "Print A." },
        { stepNumber: 9, program: "    int b_width=b_tr_x-b_bl_x, b_height=b_tr_y-b_bl_y;", explanation: "Width/height B." },
        { stepNumber: 10, program: "    int b_area=b_width*b_height;", explanation: "Area B." },
        { stepNumber: 11, program: "    cout<<\"Rectangle B Area: \"<<b_area<<endl;", explanation: "Print B." },
        { stepNumber: 12, program: "    if(a_tr_x<=b_bl_x||b_tr_x<=a_bl_x||a_tr_y<=b_bl_y||b_tr_y<=a_bl_y)", explanation: "Separation test." },
        { stepNumber: 13, program: "        cout<<\"No Intersection\"<<endl;", explanation: "No overlap." },
        { stepNumber: 14, program: "    else {", explanation: "Overlap." },
        { stepNumber: 15, program: "        int left=max(a_bl_x,b_bl_x), right=min(a_tr_x,b_tr_x);", explanation: "Left/right." },
        { stepNumber: 16, program: "        int bottom=max(a_bl_y,b_bl_y), top=min(a_tr_y,b_tr_y);", explanation: "Bottom/top." },
        { stepNumber: 17, program: "        int inter_width=right-left, inter_height=top-bottom;", explanation: "Intersection dims." },
        { stepNumber: 18, program: "        int inter_area=inter_width*inter_height;", explanation: "Intersection area." },
        { stepNumber: 19, program: "        cout<<\"Intersection Area: \"<<inter_area<<endl;", explanation: "Print area." },
        { stepNumber: 20, program: "    }", explanation: "End else." },
        { stepNumber: 21, program: "    return 0;", explanation: "Exit." },
        { stepNumber: 22, program: "}", explanation: "End." }
    ];

    // ======================= SECTION 5: BACKTRACKING (PASSWORD EXAMPLE) =======================
    // Program lines (exactly as provided)
    const backtrackSteps = [
        { stepNumber: 1, program: "#include <iostream>", explanation: "<code>#include</code> is a preprocessor directive. It tells the compiler to include a file before compilation. <code>&lt;iostream&gt;</code> is the standard input-output library. It contains definitions for <code>cout</code>, <code>cin</code>, and <code>endl</code>. Without this line, the compiler will not recognize <code>cout</code>." },
        { stepNumber: 2, program: "using namespace std;", explanation: "<code>using</code> is a keyword. <code>namespace</code> is a grouping mechanism in C++. <code>std</code> is the standard namespace where all standard functions exist. This line allows writing <code>cout</code> instead of <code>std::cout</code>." },
        { stepNumber: 3, program: "int pass[3];", explanation: "<code>int</code> is a data type that stores integers.<br><code>pass</code> is the name of the array.<br><code>[3]</code> means the array has 3 elements.<br>So memory is created like: <code>pass[0] pass[1] pass[2]</code>. Each will store one digit of the password." },
        { stepNumber: 4, program: "bool found = false;", explanation: "<code>bool</code> is a data type that stores either <code>true</code> or <code>false</code>.<br><code>found</code> is a variable name.<br><code>=</code> is assignment operator.<br><code>false</code> means password not found yet.<br>This variable is used to stop the program once the password is found." },
        { stepNumber: 5, program: "void generate(int i)", explanation: "<code>void</code> means the function does not return any value.<br><code>generate</code> is the function name.<br><code>int i</code> is a parameter.<br><code>i</code> represents the current position in the password:<br>i = 0 → first digit<br>i = 1 → second digit<br>i = 2 → third digit" },
        { stepNumber: 6, program: "    if (i == 3)", explanation: "<code>if</code> is a decision statement.<br><code>==</code> is comparison operator (checks equality).<br><code>3</code> is the size of password.<br>👉 If all 3 positions are filled, stop recursion and check password." },
        { stepNumber: 7, program: "        if (pass[0] == 1 && pass[1] == 2 && pass[2] == 3)", explanation: "Break it:<br><code>pass[0] == 1</code> → first digit must be 1<br><code>pass[1] == 2</code> → second digit must be 2<br><code>pass[2] == 3</code> → third digit must be 3<br><code>&&</code> means logical AND → all conditions must be true.<br>👉 Is password exactly 123?" },
        { stepNumber: 8, program: "            cout << \"Password Found: \";", explanation: "<code>cout</code> prints output.<br><code>&lt;&lt;</code> is insertion operator (sends data to output).<br><code>\"Password Found: \"</code> is a string literal (text inside quotes)." },
        { stepNumber: 9, program: "            for (int j = 0; j < 3; j++) cout << pass[j];", explanation: "Break it:<br><code>for</code> → loop<br><code>int j = 0</code> → start index at 0<br><code>j < 3</code> → loop runs 3 times<br><code>j++</code> → increment j by 1<br>Inside loop: <code>cout &lt;&lt; pass[j];</code> prints <code>pass[0] pass[1] pass[2]</code> (e.g., <code>123</code>)." },
        { stepNumber: 10, program: "            cout << endl;", explanation: "<code>endl</code> moves output to next line." },
        { stepNumber: 11, program: "            found = true;", explanation: "Assigns <code>true</code> to variable <code>found</code>.<br>Meaning: password has been found." },
        { stepNumber: 12, program: "        return;", explanation: "Stops current function and goes back to previous call." },
        { stepNumber: 13, program: "    for (int d = 1; d <= 3; d++)", explanation: "Loop for trying digits:<br><code>d</code> is a variable representing digit<br><code>d = 1</code> → start from 1<br><code>d &lt;= 3</code> → go till 3<br><code>d++</code> → increment by 1<br>So values of d: 1 → 2 → 3" },
        { stepNumber: 14, program: "        if (found) return;", explanation: "If password is already found, stop further execution (pruning)." },
        { stepNumber: 15, program: "        pass[i] = d;", explanation: "Assign digit <code>d</code> to position <code>i</code>.<br>Example: i = 0, d = 1 → <code>pass[0] = 1</code>" },
        { stepNumber: 16, program: "        generate(i + 1);", explanation: "Recursive call to move to next position.<br><code>i + 1</code> means next index.<br>Example: i = 0 → call <code>generate(1)</code>" },
        { stepNumber: 17, program: "int main() {", explanation: "Program starts execution from here." },
        { stepNumber: 18, program: "    generate(0);", explanation: "Start building password from index 0 (first digit)." },
        { stepNumber: 19, program: "}", explanation: "End of main." }
    ];

    // Backtracking theory block (new content)
    function getBacktrackTheoryHTML() {
        return `
            <div style="margin-bottom: 0.5rem;">
                <h3 style="color:#2c3e50;">🔁 What is Backtracking (in C++)?</h3>
                <p>Backtracking is a method where we try all possible choices step by step.<br>
                At each step we make a choice, go forward, and when done, we undo that choice and try another one.</p>
                <p><strong>Simple meaning:</strong> Try → Go forward → Undo → Try next</p>
                <hr>
                <h4>Why do we use Backtracking?</h4>
                <p>We use backtracking when:</p>
                <ul>
                    <li>We must try all possible combinations</li>
                    <li>We don't know the correct answer directly</li>
                    <li>We need to search for a correct solution</li>
                </ul>
                <hr>
                <h4>🔷 Password Example: Generate all 3-digit passwords using digits {1,2,3}</h4>
                <p><strong>Real-Life Idea: Password Checking (Target = 123)</strong></p>
                <p>Imagine: You forgot a 3-digit password. Digits allowed = 1, 2, 3. Correct password = 123.<br>
                👉 You must try all possibilities until you find it.</p>
                <p>This is exactly where backtracking is used. We want to generate all possible passwords like:<br>
                <code>111, 112, 113, 121, 122, 123, ... , 333</code></p>
                <hr>
                <p><strong>🔥 Final Understanding</strong><br>
                Backtracking here means: Try all combinations: 111, 112, 113, ..., 123, ..., 333. Stop when 123 is found.</p>
                <p style="background:#e9ecef; padding:0.5rem; border-radius:12px; text-align:center;">⬇️ <strong>Click any line of the backtracking program to see detailed explanation ⬇️</strong></p>
            </div>
        `;
    }

    // Helper functions
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function buildStepList(container, stepsArray, onClickCallback) {
        container.innerHTML = '';
        const stepsWrapper = document.createElement('div');
        stepsWrapper.className = 'step-list-container';
        stepsArray.forEach(step => {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step-item';
            stepDiv.setAttribute('data-step-id', step.stepNumber);
            stepDiv.innerHTML = `
                <div class="step-header">
                    <span class="step-number">${step.stepNumber}</span>
                    <span class="step-code"><code style="background:transparent;">${escapeHtml(step.program)}</code></span>
                </div>
            `;
            stepDiv.addEventListener('click', () => {
                document.querySelectorAll('#leftContent .step-item').forEach(el => el.classList.remove('active-step'));
                stepDiv.classList.add('active-step');
                onClickCallback(step.stepNumber);
            });
            stepsWrapper.appendChild(stepDiv);
        });
        container.appendChild(stepsWrapper);
        const note = document.createElement('div');
        note.className = 'small-note';
        note.innerHTML = '💡 Click any line → explanation appears on the right.';
        container.appendChild(note);
    }

    // Backtracking show explanation
    const backtrackMap = new Map();
    backtrackSteps.forEach(step => backtrackMap.set(step.stepNumber, step.explanation));
    function showBacktrackExplanation(stepNumber) {
        const explanation = backtrackMap.get(stepNumber);
        const programLine = backtrackSteps.find(s => s.stepNumber === stepNumber)?.program || '';
        const rightContainer = document.getElementById('rightContent');
        rightContainer.innerHTML = `
            <div class="exp-card theory-card">
                <div class="exp-step-badge" style="background:#6c3483;">📐 Backtracking Primer</div>
                <div class="exp-detail">
                    ${getBacktrackTheoryHTML()}
                </div>
            </div>
            <div class="exp-card">
                <div class="exp-step-badge">Step ${stepNumber}</div>
                <div class="exp-detail">
                    <p><strong style="font-family:monospace;">📌 ${escapeHtml(programLine)}</strong></p>
                    <div style="margin-top: 1rem;">${explanation}</div>
                </div>
            </div>
        `;
        document.getElementById('rightTitle').innerHTML = `📖 Backtracking (Step ${stepNumber})`;
    }
    function setBacktrackDefault() { showBacktrackExplanation(1); }

    // Standard handlers for other sections (simplified to avoid clutter)
    const section2Map = new Map(); section2Steps.forEach(s => section2Map.set(s.stepNumber, s.explanation));
    const section3Map = new Map(); section3Steps.forEach(s => section3Map.set(s.stepNumber, s.explanation));
    const rectMap = new Map(); rectangleSteps.forEach(s => rectMap.set(s.stepNumber, s.explanation));
    function showSection2Explanation(stepNumber) { buildStandardRight(section2Map, section2Steps, stepNumber, "Bitmasking Subsets"); }
    function showSection3Explanation(stepNumber) { buildStandardRight(section3Map, section3Steps, stepNumber, "Binary + Subsets"); }
    function showRectangleExplanation(stepNumber) { buildStandardRight(rectMap, rectangleSteps, stepNumber, "Rectangle Geometry"); }
    function buildStandardRight(expMap, stepsArr, stepNumber, titlePrefix) {
        const explanation = expMap.get(stepNumber);
        const programLine = stepsArr.find(s => s.stepNumber === stepNumber)?.program || '';
        document.getElementById('rightContent').innerHTML = `
            <div class="exp-card">
                <div class="exp-step-badge">Step ${stepNumber}</div>
                <div class="exp-detail">
                    <p><strong style="font-family:monospace;">📌 ${escapeHtml(programLine)}</strong></p>
                    <div style="margin-top: 1rem;">${explanation}</div>
                </div>
            </div>
        `;
        document.getElementById('rightTitle').innerHTML = `${titlePrefix} (Step ${stepNumber})`;
    }
    function setSection2Default() { showSection2Explanation(1); }
    function setSection3Default() { showSection3Explanation(1); }
    function setRectangleDefault() { showRectangleExplanation(1); }

    // Section 1 (Subsets theory)
    function buildSection1Left(container) {
        container.innerHTML = `<div style="background:#fdf8e7; padding:1.2rem; border-radius:1.2rem;"><h3>✅ Subset & Bitmask</h3><p>...</p><pre>Bitmask 10101 → {1,5,7}</pre></div>`;
    }
    function buildSection1Right(container) {
        container.innerHTML = `<div class="exp-card"><h4>🔍 Example</h4><p>Bitmasking maps each element to a bit.</p></div><button id="genIframeBtn">Live Tool</button><div id="iframeSubsetContainer"></div>`;
        setTimeout(() => {
            const btn = document.getElementById('genIframeBtn');
            if(btn) btn.onclick = () => document.getElementById('iframeSubsetContainer').innerHTML = `<iframe src="https://www.philippe-fournier-viger.com/tools/generate_all_subsets.php" width="100%" height="300"></iframe>`;
        }, 10);
    }

    // Main render function
    function renderSection(sectionId) {
        const leftContainer = document.getElementById('leftContent');
        if (sectionId === 'section1') {
            document.getElementById('leftTitle').innerText = "📚 Subsets & Bitmask Core";
            buildSection1Left(leftContainer);
            buildSection1Right(document.getElementById('rightContent'));
            document.getElementById('rightTitle').innerText = "💡 Examples & Tool";
        } else if (sectionId === 'section2') {
            document.getElementById('leftTitle').innerText = "💻 Subset Generator (Bitmasking)";
            buildStepList(leftContainer, section2Steps, showSection2Explanation);
            if (!window._sec2Init) { setSection2Default(); window._sec2Init = true; }
            else { const active = document.querySelector('#leftContent .step-item.active-step'); if(active) showSection2Explanation(parseInt(active.dataset.stepId)); else setSection2Default(); }
        } else if (sectionId === 'section3') {
            document.getElementById('leftTitle').innerText = "🧪 Binary + Subset by Indices";
            buildStepList(leftContainer, section3Steps, showSection3Explanation);
            if (!window._sec3Init) { setSection3Default(); window._sec3Init = true; }
            else { const active = document.querySelector('#leftContent .step-item.active-step'); if(active) showSection3Explanation(parseInt(active.dataset.stepId)); else setSection3Default(); }
        } else if (sectionId === 'section4') {
            document.getElementById('leftTitle').innerText = "📐 Rectangular Geometry";
            buildStepList(leftContainer, rectangleSteps, showRectangleExplanation);
            if (!window._sec4Init) { setRectangleDefault(); window._sec4Init = true; }
            else { const active = document.querySelector('#leftContent .step-item.active-step'); if(active) showRectangleExplanation(parseInt(active.dataset.stepId)); else setRectangleDefault(); }
        } else if (sectionId === 'section5') {
            document.getElementById('leftTitle').innerText = "🔁 Backtracking: 3-digit Password (digits 1-3)";
            buildStepList(leftContainer, backtrackSteps, showBacktrackExplanation);
            if (!window._sec5Init) { setBacktrackDefault(); window._sec5Init = true; }
            else { const active = document.querySelector('#leftContent .step-item.active-step'); if(active) showBacktrackExplanation(parseInt(active.dataset.stepId)); else setBacktrackDefault(); }
        }
    }

    // Attach button events
    document.querySelectorAll('.topic-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSection(btn.dataset.section);
        });
    });

    // Default load (section2 as before)
    renderSection('section2');
    document.querySelector('.topic-btn[data-section="section2"]').classList.add('active');
</script>
</body>
</html>
