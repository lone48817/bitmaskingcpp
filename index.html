        // ========== BACKTRACKING ==========
        { id:15, category:"BACKTRACKING", title:"📘 Backtracking: Detailed Concept", isCodeProblem:false,
          fullText:`What is Backtracking
Backtracking is a problem-solving technique where we:
•	try all possible choices 
•	build a solution step by step 
•	undo the last choice when it does not lead to answer 
•	explore all possible combinations 
It is used when:
•	we need ALL solutions 
•	or we need BEST solution among all possibilities 

Core Idea
At every step:
1.	choose something 
2.	go deeper recursively 
3.	undo the choice (backtrack) 
4.	try next option 
This is called: “try → explore → undo”

Example Idea: Subset Generation
For array: {5, 3, 1}
At each index i:
•	include a[i] 
•	exclude a[i] 
This creates a binary decision tree.

Backtracking Flow
At index i:
•	take element → go forward 
•	remove element → go forward again 

Why Undo is Important
If we don’t undo:
•	choices will affect next recursion 
•	wrong combinations will form 
So we: push element, recurse, pop element (undo)

Code Idea (Subset Generation)
We maintain vector v (current subset) and index i.
At i: add a[i], recurse, remove a[i], recurse again.

Key Insight: Backtracking = DFS + undo step

Apple Division Idea (Optimization Problem)
We split array into 2 groups, assign element to group1 or group2, compute minimum difference.

Complexity: Backtracking explores 2^n possibilities (subsets or choices)` },

        // ========== DYNAMIC PROGRAMMING ==========
        { id:21, category:"DYNAMIC PROGRAMMING", title:"📘 Dynamic Programming: Core Concept", isCodeProblem:false,
          fullText:`What is Dynamic Programming
Dynamic Programming (DP) is a technique used to solve problems by breaking them into smaller overlapping subproblems and storing their results to avoid recomputation.
It is used when:
•	the same subproblem repeats again and again 
•	optimal solution depends on smaller optimal solutions 

Key Idea: solve once, store result, reuse → memoization.

Problem Understanding
You are given an array a[] with n elements.
You start from index 0 and want to reach index n-1.
You can move:
•	from i → i-1 with cost |a[i] - a[i-1]| 
•	from i → i-2 with cost |a[i] - a[i-2]| 
Goal: Find minimum cost to reach last index.

DP State Definition: dp[i] = minimum cost to reach index i from index 0
Base Cases: dp[0] = 0, dp[1] = |a[1] - a[0]|
Transition: dp[i] = min( dp[i-1] + |a[i]-a[i-1]|, dp[i-2] + |a[i]-a[i-2]| )

Complexity: O(n) time, O(n) space.` },

        { id:27, category:"GEOMETRY & DP", title:"📐 Rectangular Geometry Concepts", isCodeProblem:false,
          fullText:`What is Rectangular Geometry
Rectangular geometry studies rectangles and intervals aligned with coordinate axes.
All shapes are axis-parallel, defined using coordinate points.
+X → right direction, +Y → upward direction.

Rectangle Representation
A rectangle is defined by Bottom-left point (bl_x, bl_y) and Top-right point (tr_x, tr_y).
Area = (tr_x - bl_x) × (tr_y - bl_y)

Intersection Condition (Key Idea)
Two rectangles intersect if X ranges overlap AND Y ranges overlap.
Intersection rectangle: left = max(bl_x1, bl_x2), right = min(tr_x1, tr_x2), bottom = max(bl_y1, bl_y2), top = min(tr_y1, tr_y2).

Interval (1D Geometry): rectangle = combination of X interval [bl_x, tr_x] and Y interval [bl_y, tr_y].` },

    // Compiler using Wandbox API
    async function compileAndRun(code, stdin) {
        const payload = {
            compiler: "gcc-13.2.0",
            code: code,
            stdin: stdin,
            options: "warning,gnu++17"
        };
        try {
            const res = await fetch("https://wandbox.org/api/compile.json", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.program_output !== undefined) return data.program_output.trim();
            else return data.compiler_error || "Compilation error";
        } catch(e) { return "API error: " + e.message; }
    }

    let activeId = 0;
    let solvedStatus = new Array(items.length).fill(false);

    function buildSidebar() {
        const container = document.getElementById("sidebarNav");
        const grouped = {};
        items.forEach(it => { if(!grouped[it.category]) grouped[it.category] = []; grouped[it.category].push(it); });
        let html = "";
        for(let cat in grouped) {
            html += `<div class="category-block"><div class="category-title">📁 ${cat}</div>`;
            grouped[cat].forEach(it => {
                const mark = solvedStatus[it.id] ? " ✓" : "";
                html += `<div class="problem-link" data-id="${it.id}">${it.title}<span class="check-icon">${mark}</span></div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll(".problem-link").forEach(link => {
            link.addEventListener("click", () => {
                const id = parseInt(link.dataset.id);
                loadItem(id);
                setActive(id);
            });
        });
        setActive(activeId);
    }

    function setActive(id) {
        document.querySelectorAll(".problem-link").forEach(link => {
            if(parseInt(link.dataset.id) === id) link.classList.add("active");
            else link.classList.remove("active");
        });
    }

    async function loadItem(id) {
        activeId = id;
        const item = items[id];
        const container = document.getElementById("mainContent");
        if(!item.isCodeProblem) {
            container.innerHTML = `
                <div class="question-card">
                    <h2>${item.title}</h2>
                    <div class="scenario-text">${item.fullText.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            return;
        }
        container.innerHTML = `
            <div class="question-card">
                <h2>${item.title}</h2>
                <div class="scenario-text">${item.fullText.replace(/\n/g, '<br>')}</div>
                <div class="io-sample"><strong>📥 Sample Input</strong><br><pre>${item.sampleInput}</pre></div>
                <div class="io-sample"><strong>🎯 Expected Output</strong><br><pre>${item.expectedOutput}</pre></div>
                <div class="compiler-box">
                    <label><strong>✏️ Write your C++ code:</strong></label>
                    <textarea id="codeEditor" class="code-area" rows="12" placeholder="// Type your solution here..."></textarea>
                    <label><strong>📟 Input (stdin):</strong></label>
                    <textarea id="stdinInput" class="stdin-area" rows="4">${item.sampleInput}</textarea>
                    <div><button id="runBtn">▶ RUN</button> <button id="verifyBtn">✅ VERIFY</button></div>
                    <div class="output-box"><strong>Program output:</strong><br><pre id="outputDisplay">(not executed yet)</pre></div>
                    <div id="feedbackDiv" class="feedback-message"></div>
                </div>
            </div>
        `;
        const runBtn = document.getElementById("runBtn");
        const verifyBtn = document.getElementById("verifyBtn");
        const codeArea = document.getElementById("codeEditor");
        const stdinArea = document.getElementById("stdinInput");
        const outputPre = document.getElementById("outputDisplay");
        const feedbackDiv = document.getElementById("feedbackDiv");

        runBtn.onclick = async () => {
            const code = codeArea.value;
            const stdin = stdinArea.value;
            outputPre.innerText = "Compiling...";
            const out = await compileAndRun(code, stdin);
            outputPre.innerText = out;
        };
        verifyBtn.onclick = async () => {
            const code = codeArea.value;
            const stdin = stdinArea.value;
            const out = await compileAndRun(code, stdin);
            outputPre.innerText = out;
            const expected = item.expectedOutput.trim();
            if(out === expected) {
                solvedStatus[id] = true;
                feedbackDiv.innerHTML = `✅ CORRECT! Output matches expected. Great job.`;
                feedbackDiv.className = "feedback-message feedback-correct";
            } else {
                feedbackDiv.innerHTML = `❌ INCORRECT. Your output: "${out}" — Expected: "${expected}". Check your logic.`;
                feedbackDiv.className = "feedback-message feedback-wrong";
            }
            buildSidebar();
            setActive(id);
        };
    }

    buildSidebar();
    loadItem(0);
</script>
